type: object
required:
  - name
  - type_
  - use_
  - time_min
properties:
  name:
    type: string
  forked_from_id:
    type:
      - string
      - "null"
  type_:
    type: string
    description: Spice, Fining, Water Agent, Herb, Flavor, Other
  use_:
    type: string
    description: Boil, Mash, Primary, Secondary, Bottling
  time_min:
    type: number
  notes:
    type:
      - string
      - "null"
  use_for:
    type:
      - string
      - "null"
  amount_is_weight:
    type: boolean
