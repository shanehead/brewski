type: object
required:
  - id
  - recipe_id
  - recipe_name
  - recipe_version_id
  - status
  - created_at
  - updated_at
properties:
  id:
    type: string
  recipe_id:
    type: string
  recipe_name:
    type: string
  recipe_version_id:
    type: string
  name:
    type: [string, "null"]
  status:
    type: string
    description: "planned | brewing | fermenting | packaged"
  brew_date:
    type: [integer, "null"]
    format: int64
  actual_og:
    type: [number, "null"]
  actual_fg:
    type: [number, "null"]
  rating:
    type: [integer, "null"]
  created_at:
    type: integer
    format: int64
  updated_at:
    type: integer
    format: int64
