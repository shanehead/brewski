type: object
required:
  - name
  - alpha_pct
  - amount_kg
  - use_
  - time_min
properties:
  hop_id:
    type: string
  name:
    type: string
  alpha_pct:
    type: number
  form:
    type: string
    description: "Pellet, Plug, Leaf, Cryo, CO2 Extract"
  amount_kg:
    type: number
  use_:
    type: string
  time_min:
    type: number
  hopstand_temp_c:
    type: number
    description: Hopstand temperature override for this addition in °C
