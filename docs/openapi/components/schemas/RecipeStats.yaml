description: Calculated statistics for a recipe, including predicted gravity, bitterness, color, and per-hop IBU contributions.
type: object
required:
  - og
  - fg
  - abv_pct
  - ibu
  - srm
  - calories_per_355ml
  - bu_gu_ratio
  - pre_boil_gravity
  - pre_boil_volume_l
  - post_boil_volume_l
  - hop_stats
  - mash_water_l
  - sparge_water_l
  - top_up_water_l
  - total_water_l
  - mash_volume_l
properties:
  og:
    type: number
    description: Calculated original gravity (specific gravity)
  fg:
    type: number
    description: Calculated final gravity (specific gravity)
  abv_pct:
    type: number
    description: Alcohol by volume percentage
  ibu:
    type: number
    description: International Bitterness Units
  srm:
    type: number
    description: Standard Reference Method color value
  calories_per_355ml:
    type: number
    description: Estimated calories per 355 ml (12 oz) serving
  bu_gu_ratio:
    type: number
    description: Bitterness/gravity ratio
  pre_boil_gravity:
    type: number
    description: Estimated pre-boil specific gravity
  pre_boil_volume_l:
    type: number
    description: Estimated pre-boil volume in litres
  post_boil_volume_l:
    type: number
    description: Estimated post-boil volume in litres
  strike_temp_c:
    type:
      - number
      - "null"
    description: Calculated strike water temperature in degrees Celsius
  mash_water_l:
    type: number
    description: Estimated mash water volume in litres
  sparge_water_l:
    type: number
    description: Estimated sparge water volume in litres (0 for no-sparge or no split defined)
  top_up_water_l:
    type: number
    description: Post-boil top-up water added to the fermenter, in litres
  total_water_l:
    type: number
    description: Total water needed (mash + sparge; does not include top-up) in litres
  mash_volume_l:
    type: number
    description: Volume occupied in the mash tun (water + grain displacement) in litres
  mash_volume_excess_l:
    type:
      - number
      - "null"
    description: Litres by which mash volume exceeds tun capacity; null when within limits, no tun volume is set, or overflow was auto-redistributed
  top_up_overflow_l:
    type:
      - number
      - "null"
    description: Litres moved from mash water to top-up water to stay within tun capacity; null when no adjustment was needed
  hop_stats:
    type: array
    items:
      $ref: "./HopStat.yaml"
    description: Per-hop IBU contributions, keyed by hop addition ID
