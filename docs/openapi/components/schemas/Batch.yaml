type: object
required:
  - id
  - recipe_id
  - recipe_name
  - recipe_version_id
  - status
  - gravity_readings
  - created_at
  - updated_at
properties:
  id:
    type: string
  recipe_id:
    type: string
  recipe_name:
    type: string
  recipe_version_id:
    type: string
  name:
    type: [string, "null"]
  status:
    type: string
    description: "planned | brewing | fermenting | conditioning | packaged"
  brew_date:
    type: [integer, "null"]
    format: int64
  fermenter_date:
    type: [integer, "null"]
    format: int64
  conditioning_date:
    type: [integer, "null"]
    format: int64
  packaging_date:
    type: [integer, "null"]
    format: int64
  actual_pre_boil_volume_l:
    type: [number, "null"]
  actual_post_boil_volume_l:
    type: [number, "null"]
  actual_batch_size_l:
    type: [number, "null"]
  actual_pre_boil_gravity:
    type: [number, "null"]
  actual_og:
    type: [number, "null"]
  actual_fg:
    type: [number, "null"]
  notes:
    type: [string, "null"]
  rating:
    type: [integer, "null"]
  planned_og:
    type: [number, "null"]
    description: Planned OG from recipe stats
  planned_fg:
    type: [number, "null"]
    description: Planned FG from recipe stats
  planned_pre_boil_gravity:
    type: [number, "null"]
    description: Planned pre-boil gravity from recipe stats
  planned_post_boil_volume_l:
    type: [number, "null"]
    description: Planned post-boil volume from recipe stats
  planned_batch_size_l:
    type: [number, "null"]
    description: Planned batch size from recipe
  gravity_readings:
    type: array
    items:
      $ref: "./GravityReading.yaml"
  created_at:
    type: integer
    format: int64
  updated_at:
    type: integer
    format: int64
