post:
  operationId: listFermentableLibrary
  summary: List all fermentables in the ingredient library
  tags:
    - Library
  responses:
    "200":
      description: Array of fermentables
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: "../../components/schemas/Fermentable.yaml"
    "500":
      $ref: "../../components/responses/Error.yaml"
