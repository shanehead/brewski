post:
  operationId: deleteRecipe
  summary: Delete a recipe
  tags:
    - Recipes
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          required:
            - id
          properties:
            id:
              type: string
  responses:
    "200":
      description: Recipe deleted
    "500":
      $ref: "../../components/responses/Error.yaml"
