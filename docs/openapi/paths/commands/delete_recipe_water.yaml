post:
  operationId: deleteRecipeWater
  summary: Remove a water profile from a recipe
  tags:
    - Water
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          required:
            - id
          properties:
            id:
              type: string
  responses:
    "200":
      description: Water addition deleted
    "500":
      $ref: "../../components/responses/Error.yaml"
