post:
  operationId: getRecipeVersion
  summary: Get a full recipe version snapshot with all ingredients and mash steps
  tags:
    - Batches
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          required:
            - id
          properties:
            id:
              type: string
  responses:
    "200":
      description: Full recipe version snapshot
      content:
        application/json:
          schema:
            $ref: "../../components/schemas/Recipe.yaml"
    "500":
      $ref: "../../components/responses/Error.yaml"
