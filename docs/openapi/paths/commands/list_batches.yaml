post:
  operationId: listBatches
  summary: List all batches sorted by brew date descending
  tags: [Batches]
  responses:
    "200":
      description: All batches
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: "../../components/schemas/BatchSummary.yaml"
    "500":
      $ref: "../../components/responses/Error.yaml"
