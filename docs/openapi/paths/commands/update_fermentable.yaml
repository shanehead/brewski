post:
  operationId: updateFermentable
  summary: Update a custom fermentable in the ingredient library
  tags:
    - Library
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          required:
            - id
            - input
          properties:
            id:
              type: string
            input:
              $ref: "../../components/schemas/UpdateFermentableInput.yaml"
  responses:
    "200":
      description: Updated fermentable
      content:
        application/json:
          schema:
            $ref: "../../components/schemas/Fermentable.yaml"
    "500":
      $ref: "../../components/responses/Error.yaml"
