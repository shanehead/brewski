post:
  operationId: deleteRecipeHop
  summary: Remove a hop from a recipe
  tags:
    - Hops
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          required:
            - id
          properties:
            id:
              type: string
  responses:
    "200":
      description: Hop addition deleted
    "500":
      $ref: "../../components/responses/Error.yaml"
