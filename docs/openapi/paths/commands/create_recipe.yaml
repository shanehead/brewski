post:
  operationId: createRecipe
  summary: Create a new recipe
  tags:
    - Recipes
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          required:
            - input
          properties:
            input:
              $ref: "../../components/schemas/CreateRecipeInput.yaml"
  responses:
    "200":
      description: Created recipe
      content:
        application/json:
          schema:
            $ref: "../../components/schemas/Recipe.yaml"
    "500":
      $ref: "../../components/responses/Error.yaml"
