post:
  operationId: updateEquipmentProfile
  summary: Update an equipment profile
  tags:
    - Equipment
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          required:
            - id
            - input
          properties:
            id:
              type: string
            input:
              $ref: "../../components/schemas/UpdateEquipmentProfileInput.yaml"
  responses:
    "200":
      description: Updated equipment profile
      content:
        application/json:
          schema:
            $ref: "../../components/schemas/EquipmentProfile.yaml"
    "500":
      $ref: "../../components/responses/Error.yaml"
