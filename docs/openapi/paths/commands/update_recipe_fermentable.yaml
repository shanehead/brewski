post:
  operationId: updateRecipeFermentable
  summary: Update a fermentable addition
  tags:
    - Fermentables
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          required:
            - id
            - input
          properties:
            id:
              type: string
            input:
              $ref: "../../components/schemas/UpdateFermentableAdditionInput.yaml"
  responses:
    "200":
      description: Updated fermentable addition
      content:
        application/json:
          schema:
            $ref: "../../components/schemas/RecipeAdditionFermentable.yaml"
    "500":
      $ref: "../../components/responses/Error.yaml"
