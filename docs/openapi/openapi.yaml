openapi: 3.1.0
info:
  title: Brewski
  description: |
    Tauri IPC interface for the Brewski homebrewing recipe manager.

    All operations are invoked via Tauri's `invoke()` IPC mechanism rather than
    HTTP. This spec models each command as a POST to `/commands/{commandName}`,
    with the request body carrying the command's named parameters and the
    response body carrying the return value.

    **Usage in frontend:**
    ```typescript
    import { invoke } from "@tauri-apps/api/core";
    const recipes = await invoke("list_recipes");
    ```

    **Error handling:** All commands return a `Result<T, String>` in Rust. On
    error, Tauri rejects the invoke promise with the error string.
  version: 1.0.0
servers:
  - url: tauri://localhost
    description: Tauri IPC (desktop app)
tags:
  - name: Recipes
    description: Create, read, update, and delete brewing recipes
  - name: Fermentables
    description: Fermentable grain/sugar additions on a recipe
  - name: Hops
    description: Hop additions on a recipe
  - name: Yeasts
    description: Yeast additions on a recipe
  - name: Misc
    description: Miscellaneous ingredient additions on a recipe
  - name: Water
    description: Water profile additions on a recipe
  - name: Water Chemistry
    description: Water source selection and mineral adjustments
  - name: Mash
    description: Mash schedule and steps for a recipe
  - name: Equipment
    description: Equipment profiles used for volume and efficiency calculations
  - name: Library
    description: Read-only reference data (styles, ingredients)
  - name: Settings
    description: User-level application settings
  - name: Import/Export
    description: BeerXML import and export
  - name: Batches
    description: Brew session tracking
