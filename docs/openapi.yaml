openapi: 3.1.0
info:
  title: Brewski
  description: |
    Tauri IPC interface for the Brewski homebrewing recipe manager.

    All operations are invoked via Tauri's `invoke()` IPC mechanism rather than
    HTTP. This spec models each command as a POST to `/commands/{commandName}`,
    with the request body carrying the command's named parameters and the
    response body carrying the return value.

    **Usage in frontend:**
    ```typescript
    import { invoke } from "@tauri-apps/api/core";
    const recipes = await invoke("list_recipes");
    ```

    **Error handling:** All commands return a `Result<T, String>` in Rust. On
    error, Tauri rejects the invoke promise with the error string.
  version: 1.0.0

servers:
  - url: tauri://localhost
    description: Tauri IPC (desktop app)

tags:
  - name: Recipes
    description: Create, read, update, and delete brewing recipes
  - name: Fermentables
    description: Fermentable grain/sugar additions on a recipe
  - name: Hops
    description: Hop additions on a recipe
  - name: Yeasts
    description: Yeast additions on a recipe
  - name: Misc
    description: Miscellaneous ingredient additions on a recipe
  - name: Water
    description: Water profile additions on a recipe
  - name: Mash
    description: Mash schedule and steps for a recipe
  - name: Equipment
    description: Equipment profiles used for volume and efficiency calculations
  - name: Library
    description: Read-only reference data (styles, ingredients)
  - name: Settings
    description: User-level application settings
  - name: Import/Export
    description: BeerXML import and export

paths:

  # ── Recipes ──────────────────────────────────────────────────────────────

  /commands/list_recipes:
    post:
      operationId: listRecipes
      summary: List all recipes
      tags: [Recipes]
      responses:
        "200":
          description: Array of recipe summaries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RecipeSummary"
        "500":
          $ref: "#/components/responses/Error"

  /commands/get_recipe:
    post:
      operationId: getRecipe
      summary: Get a full recipe by ID
      tags: [Recipes]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [id]
              properties:
                id:
                  type: string
                  description: Recipe UUID
      responses:
        "200":
          description: Full recipe with all ingredients and mash
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Recipe"
        "500":
          $ref: "#/components/responses/Error"

  /commands/create_recipe:
    post:
      operationId: createRecipe
      summary: Create a new recipe
      tags: [Recipes]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [input]
              properties:
                input:
                  $ref: "#/components/schemas/CreateRecipeInput"
      responses:
        "200":
          description: Created recipe
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Recipe"
        "500":
          $ref: "#/components/responses/Error"

  /commands/update_recipe:
    post:
      operationId: updateRecipe
      summary: Update a recipe
      tags: [Recipes]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [id, input]
              properties:
                id:
                  type: string
                input:
                  $ref: "#/components/schemas/UpdateRecipeInput"
      responses:
        "200":
          description: Updated recipe
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Recipe"
        "500":
          $ref: "#/components/responses/Error"

  /commands/delete_recipe:
    post:
      operationId: deleteRecipe
      summary: Delete a recipe
      tags: [Recipes]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [id]
