name: Release

on:
  push:
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  # ── macOS ──────────────────────────────────────────────────────────────────

  build-macos:
    runs-on: macos-latest
    environment: release
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: bun install

      - name: Import signing certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p temp brewski-ci.keychain
          security set-keychain-settings -lut 21600 brewski-ci.keychain
          security unlock-keychain -p temp brewski-ci.keychain
          security import certificate.p12 -k brewski-ci.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security list-keychains -d user -s brewski-ci.keychain $(security list-keychains -d user | tr -d '"')
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k temp brewski-ci.keychain
          rm certificate.p12

      - name: Build macOS universal binary
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: bun run tauri build --target universal-apple-darwin

      - uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: |
            src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
            src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app.tar.gz

  # ── iOS ────────────────────────────────────────────────────────────────────
  # Requires Apple Developer certificates and provisioning profiles.
  # Add secrets: APPLE_CERTIFICATE, APPLE_CERTIFICATE_PASSWORD,
  # APPLE_PROVISIONING_PROFILE, APPLE_TEAM_ID before enabling.

  build-ios:
    runs-on: macos-latest
    environment: release
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: bun install

      - name: Import signing certificate and provisioning profile
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_IOS_PROVISIONING_PROFILE: ${{ secrets.APPLE_IOS_PROVISIONING_PROFILE }}
        run: |
          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p temp ios-ci.keychain
          security set-keychain-settings -lut 21600 ios-ci.keychain
          security unlock-keychain -p temp ios-ci.keychain
          security import certificate.p12 -k ios-ci.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security list-keychains -d user -s ios-ci.keychain $(security list-keychains -d user | tr -d '"')
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k temp ios-ci.keychain
          rm certificate.p12
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$APPLE_IOS_PROVISIONING_PROFILE" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/brewski-ios.mobileprovision

      - name: Build iOS IPA
        env:
          APPLE_DEVELOPMENT_TEAM: ${{ secrets.APPLE_TEAM_ID }}
        run: bun run tauri ios build --export-method app-store-connect

      - uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: src-tauri/gen/apple/build/arm64/*.ipa

  # ── Android ────────────────────────────────────────────────────────────────
  # Produces unsigned APK and AAB. To sign for Play Store, add secrets:
  # ANDROID_KEYSTORE, ANDROID_KEY_ALIAS, ANDROID_KEY_PASSWORD,
  # ANDROID_STORE_PASSWORD and configure src-tauri/gen/android signing.

  build-android:
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Set NDK_HOME and Android linker paths
        run: |
          NDK=$(ls -d $ANDROID_HOME/ndk/* | sort -V | tail -1)
          echo "NDK_HOME=$NDK" >> $GITHUB_ENV
          HOST=linux-x86_64
          TOOLCHAIN=$NDK/toolchains/llvm/prebuilt/$HOST/bin
          echo "CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER=$TOOLCHAIN/aarch64-linux-android24-clang" >> $GITHUB_ENV
          echo "CARGO_TARGET_ARMV7_LINUX_ANDROIDEABI_LINKER=$TOOLCHAIN/armv7a-linux-androideabi24-clang" >> $GITHUB_ENV
          echo "CARGO_TARGET_I686_LINUX_ANDROID_LINKER=$TOOLCHAIN/i686-linux-android24-clang" >> $GITHUB_ENV
          echo "CARGO_TARGET_X86_64_LINUX_ANDROID_LINKER=$TOOLCHAIN/x86_64-linux-android24-clang" >> $GITHUB_ENV
          echo "CC_aarch64_linux_android=$TOOLCHAIN/aarch64-linux-android24-clang" >> $GITHUB_ENV
          echo "CC_armv7_linux_androideabi=$TOOLCHAIN/armv7a-linux-androideabi24-clang" >> $GITHUB_ENV
          echo "CC_i686_linux_android=$TOOLCHAIN/i686-linux-android24-clang" >> $GITHUB_ENV
          echo "CC_x86_64_linux_android=$TOOLCHAIN/x86_64-linux-android24-clang" >> $GITHUB_ENV
          echo "AR_aarch64_linux_android=$TOOLCHAIN/llvm-ar" >> $GITHUB_ENV
          echo "AR_armv7_linux_androideabi=$TOOLCHAIN/llvm-ar" >> $GITHUB_ENV
          echo "AR_i686_linux_android=$TOOLCHAIN/llvm-ar" >> $GITHUB_ENV
          echo "AR_x86_64_linux_android=$TOOLCHAIN/llvm-ar" >> $GITHUB_ENV

      - run: bun install

      - name: Build Android APK and AAB
        run: bun run tauri android build --apk --aab

      - uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: |
            src-tauri/gen/android/app/build/outputs/apk/**/*.apk
            src-tauri/gen/android/app/build/outputs/bundle/**/*.aab

  # ── Windows ────────────────────────────────────────────────────────────────

  build-windows:
    runs-on: windows-latest
    environment: release
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: bun install

      - name: Build Windows installer
        run: bun run tauri build

      - uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe

  # ── Linux ──────────────────────────────────────────────────────────────────

  build-linux:
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - run: bun install

      - name: Build Linux packages
        run: bun run tauri build

      - uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/rpm/*.rpm
