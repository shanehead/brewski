name: Release

on:
  push:
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  # ── macOS ──────────────────────────────────────────────────────────────────

  build-macos:
    runs-on: macos-latest
    environment: release
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: bun install

      - name: Build macOS universal binary
        run: bun run tauri build --target universal-apple-darwin

      - uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: |
            src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
            src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app.tar.gz

  # ── iOS ────────────────────────────────────────────────────────────────────
  # Requires Apple Developer certificates and provisioning profiles.
  # Add secrets: APPLE_CERTIFICATE, APPLE_CERTIFICATE_PASSWORD,
  # APPLE_PROVISIONING_PROFILE, APPLE_TEAM_ID before enabling.

  build-ios:
    runs-on: macos-latest
    environment: release
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: bun install

      - name: Build iOS IPA
        run: bun run tauri ios build

      - uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: src-tauri/gen/apple/build/arm64/*.ipa

  # ── Android ────────────────────────────────────────────────────────────────
  # Produces unsigned APK and AAB. To sign for Play Store, add secrets:
  # ANDROID_KEYSTORE, ANDROID_KEY_ALIAS, ANDROID_KEY_PASSWORD,
  # ANDROID_STORE_PASSWORD and configure src-tauri/gen/android signing.

  build-android:
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Set NDK_HOME
        run: echo "NDK_HOME=$(ls -d $ANDROID_HOME/ndk/* | sort -V | tail -1)" >> $GITHUB_ENV

      - run: bun install

      - name: Build Android APK and AAB
        run: bun run tauri android build --apk --aab

      - uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: |
            src-tauri/gen/android/app/build/outputs/apk/**/*.apk
            src-tauri/gen/android/app/build/outputs/bundle/**/*.aab

  # ── Windows ────────────────────────────────────────────────────────────────

  build-windows:
    runs-on: windows-latest
    environment: release
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: bun install

      - name: Build Windows installer
        run: bun run tauri build

      - uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe

  # ── Linux ──────────────────────────────────────────────────────────────────

  build-linux:
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - run: bun install

      - name: Build Linux packages
        run: bun run tauri build

      - uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/rpm/*.rpm
