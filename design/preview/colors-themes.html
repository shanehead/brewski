<!doctype html>
<html lang="en"><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<link rel="stylesheet" href="_card.css"/>
<style>
  body { padding: 16px 20px; background: #0d0d12; }
  .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
  .t {
    border-radius: var(--radius-md);
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.08);
  }
  .t .preview { height: 60px; display: flex; flex-direction: column; }
  .t .top { flex: 1; display: flex; }
  .t .base { flex: 1; }
  .t .surface { width: 40%; }
  .t .dot { width: 8px; height: 8px; border-radius: 50%; align-self: center; margin-left: 10px; }
  .t .name { font: 600 10px/1 var(--font-sans); padding: 6px 8px; text-align: center; background: rgba(255,255,255,0.04); color: rgba(255,255,255,0.85); }
  .t.lighty .name { background: rgba(0,0,0,0.04); color: #1f2328; border-top: 1px solid rgba(0,0,0,0.06); }
</style></head>
<body>
<div class="grid">
  <div class="t" style="--bg:#13131c;--surf:#0d0d12;--accent:#5c5cff"><div class="preview" style="background:var(--surf)"><div class="top" style="background:var(--bg)"><span class="dot" style="background:var(--accent)"></span></div></div><div class="name">Midnight</div></div>
  <div class="t" style="--bg:#16161e;--surf:#1a1b2e;--accent:#7aa2f7"><div class="preview" style="background:var(--surf)"><div class="top" style="background:var(--bg)"><span class="dot" style="background:var(--accent)"></span></div></div><div class="name">Tokyo Night</div></div>
  <div class="t" style="--bg:#1e1f29;--surf:#282a36;--accent:#bd93f9"><div class="preview" style="background:var(--surf)"><div class="top" style="background:var(--bg)"><span class="dot" style="background:var(--accent)"></span></div></div><div class="name">Dracula</div></div>
  <div class="t" style="--bg:#181825;--surf:#1e1e2e;--accent:#cba6f7"><div class="preview" style="background:var(--surf)"><div class="top" style="background:var(--bg)"><span class="dot" style="background:var(--accent)"></span></div></div><div class="name">Catppuccin</div></div>
  <div class="t" style="--bg:#242933;--surf:#2e3440;--accent:#88c0d0"><div class="preview" style="background:var(--surf)"><div class="top" style="background:var(--bg)"><span class="dot" style="background:var(--accent)"></span></div></div><div class="name">Nord</div></div>
  <div class="t" style="--bg:#1e1f1c;--surf:#272822;--accent:#a6e22e"><div class="preview" style="background:var(--surf)"><div class="top" style="background:var(--bg)"><span class="dot" style="background:var(--accent)"></span></div></div><div class="name">Monokai</div></div>
  <div class="t lighty" style="--bg:#e6e9ef;--surf:#eff1f5;--accent:#8839ef"><div class="preview" style="background:var(--surf)"><div class="top" style="background:var(--bg)"><span class="dot" style="background:var(--accent)"></span></div></div><div class="name">Catppuccin Latte</div></div>
  <div class="t lighty" style="--bg:#eee8d5;--surf:#fdf6e3;--accent:#268bd2"><div class="preview" style="background:var(--surf)"><div class="top" style="background:var(--bg)"><span class="dot" style="background:var(--accent)"></span></div></div><div class="name">Solarized Light</div></div>
  <div class="t lighty" style="--bg:#f3f4f5;--surf:#fafafa;--accent:#ff9940"><div class="preview" style="background:var(--surf)"><div class="top" style="background:var(--bg)"><span class="dot" style="background:var(--accent)"></span></div></div><div class="name">Ayu Light</div></div>
  <div class="t lighty" style="--bg:#f6f8fa;--surf:#ffffff;--accent:#0969da"><div class="preview" style="background:var(--surf)"><div class="top" style="background:var(--bg)"><span class="dot" style="background:var(--accent)"></span></div></div><div class="name">GitHub Light</div></div>
</div>
</body></html>
