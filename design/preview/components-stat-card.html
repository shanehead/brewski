<!doctype html>
<html lang="en"><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<link rel="stylesheet" href="_card.css"/>
<style>
  body { padding: 16px 22px; }
  .grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    align-items: stretch;        /* all rows the same height */
  }
  .col { display: flex; flex-direction: column; gap: 4px; }

  /* Stat card — fixed internal layout so every variant is the same size */
  .stat {
    background: var(--color-bg-elevated);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-lg);
    padding: 10px 12px;
    display: flex; flex-direction: column;
    flex: 1;                     /* fill its grid cell */
  }
  .lbl { font: 400 11px/1 var(--font-sans); color: var(--color-text-muted); margin-bottom: 4px; }
  .val {
    font-family: var(--font-mono);
    font-weight: 700;
    font-size: 22px;             /* always 22, never different */
    line-height: 1;
    color: var(--color-text-primary);
    font-variant-numeric: tabular-nums;
    letter-spacing: -0.02em;
    display: flex; align-items: center; gap: 8px;
  }
  .val .unit {
    font-family: var(--font-sans);
    font-weight: 400;
    font-size: 13px;
    color: var(--color-text-muted);
    margin-left: 2px;
  }
  .val .swatch {
    width: 18px; height: 18px;
    border-radius: 4px;
    background: #FBB123;
    border: 1px solid rgba(255,255,255,0.15);
    flex-shrink: 0;
  }

  /* The bar slot — reserved space, so cards without a bar stay the same height */
  .bar {
    margin-top: auto;             /* push to bottom of card */
    padding-top: 8px;
    height: 11px;                 /* 8px gap + 3px bar */
  }
  .bar > div {
    height: 3px;
    border-radius: 2px;
    background: var(--color-border);
    overflow: hidden;
  }
  .bar > div > div {
    height: 100%;
    border-radius: 2px;
  }

  .anno {
    font: 500 10px/1 var(--font-mono);
    color: var(--color-text-muted);
  }
</style></head>
<body data-theme="midnight">
  <div class="grid">
    <div class="col">
      <div class="stat">
        <div class="lbl">OG</div>
        <div class="val">1.052</div>
        <div class="bar"><div><div style="width:44%;background:var(--color-accent)"></div></div></div>
      </div>
      <div class="anno">with accent bar</div>
    </div>

    <div class="col">
      <div class="stat">
        <div class="lbl">ABV</div>
        <div class="val">5.4<span class="unit">%</span></div>
        <div class="bar"><div><div style="width:45%;background:#a6e3a1"></div></div></div>
      </div>
      <div class="anno">with green bar</div>
    </div>

    <div class="col">
      <div class="stat">
        <div class="lbl">SRM</div>
        <div class="val"><span class="swatch"></span>5.4</div>
        <div class="bar"></div>
      </div>
      <div class="anno">inline swatch · no bar</div>
    </div>

    <div class="col">
      <div class="stat">
        <div class="lbl">Pre-boil</div>
        <div class="val">6.5<span class="unit">gal</span></div>
        <div class="bar"></div>
      </div>
      <div class="anno">volume · no bar</div>
    </div>
  </div>
</body></html>
