<!doctype html>
<html lang="en"><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<link rel="stylesheet" href="_card.css"/>
<style>
  body { padding: 18px 22px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }
  .field { display: flex; flex-direction: column; gap: 4px; }
  .field label { font: 500 11px var(--font-sans); color: var(--color-text-secondary); }
  .field input, .field select {
    background: var(--color-bg-elevated);
    color: var(--color-text-primary);
    border: 1px solid var(--color-border);
    border-radius: 6px;
    padding: 6px 8px;
    font: 400 13px var(--font-sans);
    outline: none;
  }
  .field input:focus, .field select:focus { border-color: var(--color-accent); }
  .search {
    position: relative;
  }
  .search input {
    padding-left: 28px;
    background: var(--color-bg-elevated);
    color: var(--color-text-primary);
    border: 1px solid var(--color-border);
    border-radius: 6px; font-size: 13px; width: 100%;
    padding-top: 6px; padding-bottom: 6px;
    outline: none;
  }
  .search svg { position: absolute; left: 8px; top: 50%; transform: translateY(-50%); color: var(--color-text-muted); }
</style></head>
<body data-theme="midnight">
  <div class="grid">
    <div class="field">
      <label>Batch Size (gal)</label>
      <input type="text" value="5.0"/>
    </div>
    <div class="field">
      <label>Recipe Type</label>
      <select><option>all grain</option><option>extract</option></select>
    </div>
    <div class="field">
      <label>Search recipes</label>
      <div class="search">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="search" placeholder="Search recipes…"/>
      </div>
    </div>
  </div>
</body></html>
