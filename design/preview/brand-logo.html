<!doctype html>
<html lang="en"><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<link rel="stylesheet" href="_card.css"/>
<style>
  body { padding: 0; }
  .stage { display: grid; grid-template-columns: 1fr 1fr; gap: 0; height: 240px; }
  .side { display: flex; align-items: center; justify-content: center; gap: 22px; padding: 0 30px; }

  .dark  { background: #0d0d12; }
  .light { background: #ffffff; }

  /* Explicit colors per side — never inherit, never rely on opacity */
  .dark  .name { color: #f0f0f5; }
  .dark  .tag  { color: #a0a0b4; }
  .light .name { color: #1f2328; }
  .light .tag  { color: #57606a; }

  .name { font: 700 32px/1 var(--font-sans); letter-spacing: -0.025em; }
  .tag  { display: block; font: 500 12px/1.4 var(--font-sans); margin-top: 8px; }

  img.logo { width: 96px; height: 96px; border-radius: 22px; flex-shrink: 0; }
</style></head>
<body data-theme="midnight">
  <div class="stage">
    <div class="side dark">
      <img class="logo" src="../assets/brewski-logo.png" alt=""/>
      <div>
        <span class="name">Brewski</span>
        <span class="tag">Home-brewing, on every device</span>
      </div>
    </div>
    <div class="side light">
      <img class="logo" src="../assets/brewski-logo.png" alt=""/>
      <div>
        <span class="name">Brewski</span>
        <span class="tag">Home-brewing, on every device</span>
      </div>
    </div>
  </div>
</body></html>
