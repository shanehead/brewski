<!doctype html>
<html lang="en"><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<link rel="stylesheet" href="_card.css"/>
<style>
  .row { align-items: center; gap: 18px; padding: 6px 0; border-bottom: 1px solid var(--color-border); }
  .row:last-child { border-bottom: 0; }
  .token { font-family: var(--font-mono); font-size: 10px; color: var(--color-text-muted); width: 80px; flex-shrink: 0; }
  .px { font-family: var(--font-mono); font-size: 10px; color: var(--color-text-muted); width: 48px; text-align: right; flex-shrink: 0; }
  .specimen { flex: 1; color: var(--color-text-primary); font-family: var(--font-sans); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
</style></head>
<body data-theme="midnight">
  <div>
    <div class="row"><span class="token">--fs-4xl</span><span class="px">36px</span><span class="specimen" style="font-size:30px;font-weight:600">1.052 OG</span></div>
    <div class="row"><span class="token">--fs-3xl</span><span class="px">30px</span><span class="specimen" style="font-size:24px;font-weight:600">5.4% ABV</span></div>
    <div class="row"><span class="token">--fs-xl</span><span class="px">20px</span><span class="specimen" style="font-size:20px;font-weight:600">Ingredient Library</span></div>
    <div class="row"><span class="token">--fs-lg</span><span class="px">18px</span><span class="specimen" style="font-size:18px;font-weight:600">Recipe Details</span></div>
    <div class="row"><span class="token">--fs-base</span><span class="px">14px</span><span class="specimen" style="font-size:14px">A balanced English IPA with Maris Otter and East Kent Goldings.</span></div>
    <div class="row"><span class="token">--fs-sm</span><span class="px">13px</span><span class="specimen" style="font-size:13px;color:var(--color-text-secondary)">Pale Ale · 5.0 gal · 60 min boil</span></div>
    <div class="row"><span class="token">--fs-xs</span><span class="px">11px</span><span class="specimen" style="font-size:11px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:var(--color-text-muted)">Recipe Details</span></div>
  </div>
</body></html>
