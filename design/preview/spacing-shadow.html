<!doctype html>
<html lang="en"><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<link rel="stylesheet" href="_card.css"/>
<style>
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; padding-top: 6px; }
  .box {
    background: var(--color-bg-elevated);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-lg);
    height: 72px;
    display: flex; align-items: center; justify-content: center;
    font: 500 11px var(--font-mono); color: var(--color-text-secondary);
  }
  .lbl { font: 500 10px/1 var(--font-mono); color: var(--color-text-muted); margin-top: 8px; text-align: center; }
</style></head>
<body data-theme="midnight">
  <div class="grid">
    <div>
      <div class="box">border only</div>
      <div class="lbl">default surface separation</div>
    </div>
    <div>
      <div class="box" style="box-shadow: 0 1px 2px rgba(0,0,0,0.18)">shadow-sm</div>
      <div class="lbl">rare — small popovers</div>
    </div>
    <div>
      <div class="box" style="box-shadow: 0 4px 12px -2px rgba(0,0,0,0.30)">shadow-md</div>
      <div class="lbl">save-version popover</div>
    </div>
    <div>
      <div class="box" style="box-shadow: 0 12px 32px -6px rgba(0,0,0,0.45)">shadow-lg</div>
      <div class="lbl">confirm modal sheet</div>
    </div>
  </div>
</body></html>
