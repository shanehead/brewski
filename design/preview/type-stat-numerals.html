<!doctype html>
<html lang="en"><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<link rel="stylesheet" href="_card.css"/>
<style>
  .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
  .stat {
    background: var(--color-bg-elevated);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-lg);
    padding: 10px 12px;
  }
  .lbl { font: 500 11px/1 var(--font-sans); color: var(--color-text-muted); margin-bottom: 6px; }
  .val { font-family: var(--font-mono); font-weight: 700; font-size: 22px; line-height: 1; color: var(--color-text-primary); font-variant-numeric: tabular-nums; letter-spacing: -0.02em; }
  .val .unit { font: 500 13px var(--font-sans); color: var(--color-text-muted); }
  .bar { margin-top: 8px; height: 3px; border-radius: 2px; background: var(--color-border); overflow: hidden; }
  .bar > div { height: 100%; border-radius: 2px; background: var(--color-accent); }
</style></head>
<body data-theme="midnight">
  <div class="grid">
    <div class="stat"><div class="lbl">OG</div><div class="val">1.052</div><div class="bar"><div style="width:44%"></div></div></div>
    <div class="stat"><div class="lbl">FG</div><div class="val">1.011</div><div class="bar"><div style="width:36%"></div></div></div>
    <div class="stat"><div class="lbl">ABV</div><div class="val">5.4<span class="unit">%</span></div><div class="bar"><div style="width:45%;background:#a6e3a1"></div></div></div>
    <div class="stat"><div class="lbl">IBU</div><div class="val">38</div><div class="bar"><div style="width:32%;background:#fab387"></div></div></div>
    <div class="stat"><div class="lbl">SRM</div>
      <div class="val" style="display:flex;align-items:center;gap:8px">
        <span style="width:18px;height:18px;border-radius:4px;background:#FBB123;border:1px solid rgba(255,255,255,0.15);display:inline-block"></span>5.4
      </div>
    </div>
  </div>
</body></html>
