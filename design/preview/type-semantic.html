<!doctype html>
<html lang="en"><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<link rel="stylesheet" href="_card.css"/>
<style>
  .row { padding: 6px 0; display:flex; align-items: baseline; gap: 18px; border-bottom: 1px solid var(--color-border); }
  .row:last-child { border-bottom: 0; }
  .name { font-family: var(--font-mono); font-size: 10px; color: var(--color-text-muted); width: 130px; flex-shrink: 0; }
  .spec { flex: 1; }
</style></head>
<body data-theme="midnight">
  <div>
    <div class="row"><span class="name">.h-page</span><span class="spec h-page">Ingredient Library</span></div>
    <div class="row"><span class="name">.h-section</span><span class="spec h-section">Appearance</span></div>
    <div class="row"><span class="name">.h-eyebrow</span><span class="spec h-eyebrow">Recipe Details</span></div>
    <div class="row"><span class="name">.t-label</span><span class="spec t-label">Original Gravity</span></div>
    <div class="row"><span class="name">.t-body</span><span class="spec t-body">A balanced English IPA with Maris Otter.</span></div>
    <div class="row"><span class="name">.t-meta</span><span class="spec t-meta">Pale Ale · 5.0 gal · 60 min</span></div>
    <div class="row"><span class="name">.t-muted</span><span class="spec t-muted">Add ingredients to see stats</span></div>
    <div class="row"><span class="name">.t-stat-value</span><span class="spec t-stat-value">1.052</span></div>
  </div>
</body></html>
