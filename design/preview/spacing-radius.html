<!doctype html>
<html lang="en"><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<link rel="stylesheet" href="_card.css"/>
<style>
  .grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 12px; }
  .item { display: flex; flex-direction: column; gap: 6px; align-items: center; }
  .box {
    background: var(--color-bg-elevated);
    border: 1px solid var(--color-border);
    width: 60px; height: 60px;
  }
  .lbl { font: 500 10px/1 var(--font-mono); color: var(--color-text-secondary); }
  .px { font: 400 10px/1 var(--font-mono); color: var(--color-text-muted); }
</style></head>
<body data-theme="midnight">
  <div class="grid">
    <div class="item"><div class="box" style="border-radius:4px"></div><div class="lbl">--radius-sm</div><div class="px">4px</div></div>
    <div class="item"><div class="box" style="border-radius:6px"></div><div class="lbl">--radius-md</div><div class="px">6px</div></div>
    <div class="item"><div class="box" style="border-radius:8px"></div><div class="lbl">--radius-lg</div><div class="px">8px</div></div>
    <div class="item"><div class="box" style="border-radius:12px"></div><div class="lbl">--radius-xl</div><div class="px">12px</div></div>
    <div class="item"><div class="box" style="border-radius:16px"></div><div class="lbl">--radius-2xl</div><div class="px">16px</div></div>
    <div class="item"><div class="box" style="border-radius:9999px"></div><div class="lbl">--radius-full</div><div class="px">pill</div></div>
  </div>
</body></html>
