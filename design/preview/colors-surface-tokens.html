<!doctype html>
<html lang="en"><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<link rel="stylesheet" href="_card.css"/>
</head>
<body data-theme="midnight">
  <div class="card-wrap">
    <div class="row">
      <div class="swatch" style="flex:1"><div class="chip" style="background:var(--color-bg-base)"></div><div class="lbl">bg-base</div><div class="hex">#0d0d12</div></div>
      <div class="swatch" style="flex:1"><div class="chip" style="background:var(--color-bg-surface)"></div><div class="lbl">bg-surface</div><div class="hex">#13131c</div></div>
      <div class="swatch" style="flex:1"><div class="chip" style="background:var(--color-bg-elevated)"></div><div class="lbl">bg-elevated</div><div class="hex">#1a1a2a</div></div>
      <div class="swatch" style="flex:1"><div class="chip" style="background:var(--color-border)"></div><div class="lbl">border</div><div class="hex">#1e1e2e</div></div>
      <div class="swatch" style="flex:1"><div class="chip" style="background:var(--color-accent)"></div><div class="lbl">accent</div><div class="hex">#5c5cff</div></div>
      <div class="swatch" style="flex:1"><div class="chip" style="background:var(--color-accent-hover)"></div><div class="lbl">accent-hover</div><div class="hex">#7c7cff</div></div>
    </div>
  </div>
</body></html>
