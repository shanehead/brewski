<!doctype html>
<html lang="en"><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<link rel="stylesheet" href="_card.css"/>
<style>
  .row { gap: 12px; }
  .tile {
    flex: 1;
    background: var(--color-bg-surface);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-md);
    padding: 12px;
    display: flex; flex-direction: column; align-items: flex-start; gap: 8px;
  }
  .tile svg { width: 34px; height: 34px; }
  .tile .name { font: 600 12px/1 var(--font-sans); color: var(--color-text-primary); }
  .tile .hex { font: 500 10px/1 var(--font-mono); color: var(--color-text-muted); }
  .swatch-row { display: flex; gap: 4px; width: 100%; height: 6px; }
  .swatch-row span { flex: 1; border-radius: 2px; }
</style></head>
<body data-theme="midnight">
  <div class="row">
    <div class="tile">
      <svg viewBox="0 0 24 24"><use href="#i-hop"/></svg>
      <span class="name">Hops</span>
      <span class="hex">#22c55e</span>
      <div class="swatch-row"><span style="background:#bbf7d0"></span><span style="background:#4ade80"></span><span style="background:#22c55e"></span><span style="background:#16a34a"></span></div>
    </div>
    <div class="tile">
      <svg viewBox="0 0 24 24"><use href="#i-fermentable"/></svg>
      <span class="name">Fermentables</span>
      <span class="hex">#f59e0b</span>
      <div class="swatch-row"><span style="background:#fcd34d"></span><span style="background:#fbbf24"></span><span style="background:#f59e0b"></span><span style="background:#d97706"></span></div>
    </div>
    <div class="tile">
      <svg viewBox="0 0 24 24"><use href="#i-yeast"/></svg>
      <span class="name">Yeast</span>
      <span class="hex">#14b8a6</span>
      <div class="swatch-row"><span style="background:#5eead4"></span><span style="background:#14b8a6"></span><span style="background:#0d9488"></span><span style="background:#0f766e"></span></div>
    </div>
    <div class="tile">
      <svg viewBox="0 0 24 24"><use href="#i-water"/></svg>
      <span class="name">Water</span>
      <span class="hex">#38bdf8</span>
      <div class="swatch-row"><span style="background:#7dd3fc"></span><span style="background:#38bdf8"></span><span style="background:#0284c7"></span><span style="background:#075985"></span></div>
    </div>
    <div class="tile">
      <svg viewBox="0 0 24 24"><use href="#i-equipment"/></svg>
      <span class="name">Equipment</span>
      <span class="hex">#8b5cf6</span>
      <div class="swatch-row"><span style="background:#c4b5fd"></span><span style="background:#a78bfa"></span><span style="background:#8b5cf6"></span><span style="background:#7c3aed"></span></div>
    </div>
  </div>
  <!-- Inline icon symbols -->
  <svg width="0" height="0" style="position:absolute" aria-hidden="true">
    <symbol id="i-hop" viewBox="0 0 24 24">
      <path d="M12 4C9 4 6 7 6 12C6 17 9 20 12 20C15 20 18 17 18 12C18 7 15 4 12 4Z" fill="#22c55e"/>
      <path d="M12 4C15 4 18 7 18 12C18 17 15 20 12 20L12 4Z" fill="#16a34a"/>
      <path d="M9 9L12 6L15 9L12 18Z" fill="#bbf7d0" opacity="0.7"/>
      <path d="M7 12C5 10 5 8 7 7" stroke="#4ade80" stroke-width="1.5" fill="none" stroke-linecap="round"/>
      <path d="M17 12C19 10 19 8 17 7" stroke="#4ade80" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    </symbol>
    <symbol id="i-fermentable" viewBox="0 0 24 24">
      <line x1="12" y1="22" x2="12" y2="8" stroke="#d97706" stroke-width="2"/>
      <ellipse cx="12" cy="7" rx="3" ry="5" fill="#f59e0b"/>
      <ellipse cx="8.5" cy="11" rx="2.5" ry="4" fill="#fbbf24" transform="rotate(-25 8.5 11)"/>
      <ellipse cx="15.5" cy="11" rx="2.5" ry="4" fill="#f59e0b" transform="rotate(25 15.5 11)"/>
    </symbol>
    <symbol id="i-yeast" viewBox="0 0 24 24">
      <path d="M9 3L15 3L15 10L20 19C20 20.1 19.1 21 18 21L6 21C4.9 21 4 20.1 4 19L9 10Z" fill="#14b8a6"/>
      <path d="M9 3L15 3L15 10L20 19C20 20.1 19.1 21 18 21L12 21L12 10L15 3Z" fill="#0d9488"/>
      <rect x="8" y="2" width="8" height="2" rx="1" fill="#5eead4"/>
    </symbol>
    <symbol id="i-water" viewBox="0 0 24 24">
      <path d="M12 3C12 3 4 12 4 16C4 20 7.6 23 12 23C16.4 23 20 20 20 16C20 12 12 3 12 3Z" fill="#38bdf8"/>
      <path d="M12 3C12 3 20 12 20 16C20 20 16.4 23 12 23L12 3Z" fill="#0284c7"/>
    </symbol>
    <symbol id="i-equipment" viewBox="0 0 24 24">
      <rect x="4" y="7" width="16" height="11" rx="3" fill="#7c3aed"/>
      <rect x="4" y="7" width="16" height="5" rx="3" fill="#8b5cf6"/>
      <rect x="6" y="4" width="12" height="4" rx="2" fill="#a78bfa"/>
      <rect x="10" y="2" width="4" height="3" rx="1.5" fill="#c4b5fd"/>
    </symbol>
  </svg>
</body></html>
