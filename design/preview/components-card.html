<!doctype html>
<html lang="en"><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<link rel="stylesheet" href="_card.css"/>
<style>
  body { padding: 16px 20px; display: flex; flex-direction: column; gap: 12px; }

  /* base card */
  .card {
    background: var(--color-bg-surface);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-xl);
    overflow: hidden;
  }
  .head {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 14px;
    border-bottom: 1px solid var(--color-border);
  }
  .head .eyebrow {
    flex: 1;
    font: 600 11px/1 var(--font-sans);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--color-text-muted);
  }
  .head svg { width: 16px; height: 16px; }
  .head .right { display: flex; align-items: center; gap: 8px; }

  /* shared body styles */
  .body { padding: 12px 14px; }
  .field { display: flex; flex-direction: column; gap: 3px; }
  .field label { font: 500 10px var(--font-sans); color: var(--color-text-secondary); }
  .field input, .field select {
    background: var(--color-bg-elevated); color: var(--color-text-primary);
    border: 1px solid var(--color-border); border-radius: 6px;
    padding: 5px 8px; font: 400 12px var(--font-sans); outline: none;
  }

  /* tag in header */
  .tag {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 2px 8px;
    border-radius: 4px;
    background: var(--color-bg-elevated);
    border: 1px solid var(--color-border);
    font: 500 10px var(--font-sans);
    color: var(--color-text-secondary);
  }
  .tag .dot { width: 6px; height: 6px; border-radius: 50%; }

  /* ghost action */
  .ghost {
    background: transparent; border: 0; cursor: pointer;
    padding: 2px 6px; border-radius: 4px;
    font: 500 11px var(--font-sans);
    color: var(--color-accent);
  }
  .ghost:hover { background: color-mix(in srgb, var(--color-accent) 15%, transparent); }

  /* stat row inside card body */
  .stat-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
  .stat-row .item { display: flex; flex-direction: column; gap: 2px; }
  .stat-row .lbl { font: 500 9px var(--font-sans); text-transform: uppercase; letter-spacing: 0.1em; color: var(--color-text-muted); }
  .stat-row .val { font: 700 18px var(--font-mono); color: var(--color-text-primary); line-height: 1; font-variant-numeric: tabular-nums; letter-spacing: -0.02em; }
  .stat-row .val .u { font: 400 10px var(--font-sans); color: var(--color-text-muted); margin-left: 1px; }
  .stat-row .swatch { display: inline-block; width: 14px; height: 14px; border-radius: 3px; vertical-align: -2px; margin-right: 4px; border: 1px solid rgba(255,255,255,0.15); }

  /* footer action row */
  .actions {
    display: flex; justify-content: flex-end; gap: 8px;
    padding: 8px 14px;
    border-top: 1px solid var(--color-border);
    background: color-mix(in srgb, var(--color-bg-elevated) 50%, var(--color-bg-surface));
  }
  .btn {
    padding: 5px 12px;
    border-radius: 6px;
    font: 500 12px var(--font-sans);
    border: 1px solid transparent;
    cursor: pointer;
  }
  .btn.primary { background: var(--color-accent); color: #fff; }
  .btn.secondary { background: var(--color-bg-elevated); color: var(--color-text-secondary); border-color: var(--color-border); }

  /* annotation chip floating right */
  .anno {
    font: 500 9px/1 var(--font-mono);
    text-transform: uppercase; letter-spacing: 0.12em;
    color: var(--color-text-muted);
    padding-left: 14px;
  }
</style></head>
<body data-theme="midnight">

  <!-- Variant 1: default — eyebrow only -->
  <div>
    <div class="card">
      <div class="head"><span class="eyebrow">Recipe Details</span></div>
      <div class="body" style="display:grid;grid-template-columns:1fr 1fr;gap:10px 14px">
        <div class="field"><label>Brewer</label><input value="Shane"/></div>
        <div class="field"><label>Style</label><input value="American IPA"/></div>
      </div>
    </div>
    <div class="anno">default · eyebrow + form body</div>
  </div>

  <!-- Variant 2: header with brewing icon + style tag -->
  <div>
    <div class="card">
      <div class="head">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M4 4C4 3 5 2 6 2H12V12L9 10.5L6 12V2" fill="#3b82f6"/>
          <path d="M12 2H18C19 2 20 3 20 4V20C20 21 19 22 18 22H6C5 22 4 21 4 20V12" fill="#2563eb"/>
          <rect x="8" y="14" width="8" height="1.5" rx="0.75" fill="white" opacity="0.5"/>
          <rect x="8" y="17" width="5" height="1.5" rx="0.75" fill="white" opacity="0.5"/>
        </svg>
        <span class="eyebrow">Recipe Details</span>
        <div class="right">
          <span class="tag"><span class="dot" style="background:#FBB123"></span>American IPA</span>
        </div>
      </div>
      <div class="body" style="display:grid;grid-template-columns:1fr 1fr;gap:10px 14px">
        <div class="field"><label>Brewer</label><input value="Shane"/></div>
        <div class="field"><label>Date</label><input value="2025-11-12"/></div>
      </div>
    </div>
    <div class="anno">enriched header · brewing icon + tag</div>
  </div>

  <!-- Variant 3: footer action row -->
  <div>
    <div class="card">
      <div class="head"><span class="eyebrow">Notes</span></div>
      <div class="body" style="font: 400 13px/1.5 var(--font-sans); color: var(--color-text-primary)">
        Bright and bitter — Citra + Simcoe + Mosaic, late-boil and dry-hop.
        Maris Otter as the base for a touch of biscuit underneath the citrus.
      </div>
      <div class="actions">
        <button class="btn secondary">Discard</button>
        <button class="btn primary">Save</button>
      </div>
    </div>
    <div class="anno">extended footer · prose body + action row</div>
  </div>

</body></html>
