<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Brewski — Desktop UI kit</title>
  <link rel="icon" href="../../assets/favicon.png" />
  <link rel="stylesheet" href="theme.css" />
</head>
<body data-theme="midnight">
  <div id="root"></div>

  <!-- React 18 + Babel (pinned with integrity, per design-system convention) -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- Brewski icon dictionary + sample data -->
  <script src="icons.js"></script>
  <script src="data.js"></script>

  <!-- Components (load order: leaf → containers → app) -->
  <script type="text/babel" src="BrewingIcon.jsx"></script>
  <script type="text/babel" src="Card.jsx"></script>
  <script type="text/babel" src="StatPill.jsx"></script>
  <script type="text/babel" src="TabBar.jsx"></script>
  <script type="text/babel" src="StatsSidebar.jsx"></script>
  <script type="text/babel" src="RecipeList.jsx"></script>
  <script type="text/babel" src="OverviewTab.jsx"></script>
  <script type="text/babel" src="IngredientsTab.jsx"></script>
  <script type="text/babel" src="RecipeView.jsx"></script>
  <script type="text/babel" src="BatchesView.jsx"></script>
  <script type="text/babel" src="ToolView.jsx"></script>
  <script type="text/babel" src="SettingsView.jsx"></script>
  <script type="text/babel" src="AppShell.jsx"></script>
  <script type="text/babel" src="App.jsx"></script>
</body>
</html>
